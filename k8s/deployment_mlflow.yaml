apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      nodeSelector:
        node-role: training
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.12.1
          ports:
            - containerPort: 5000
          env:
          - name: GOOGLE_APPLICATION_CREDENTIALS
            value: /app/key.json
          - name: BUCKET_NAME
            valueFrom:
              secretKeyRef:
                name: gcp-secrets
                key: bucket-name
          - name: BLOB_NAME
            valueFrom:
              secretKeyRef:
                name: gcp-secrets
                key: blob-name
          volumeMounts:
          - name: gcp-key
            mountPath: /app/key.json
            subPath: key.json
          command: ["mlflow", "server"]
          args:
            - "--backend-store-uri=postgresql://mlflow_user:mlflow123@35.234.123.45:5432/mlflow_db"
            - "--default-artifact-root=gs://ml-artifacts-tutorial"
            - "--host=0.0.0.0"
      volumes:
        - name: gcp-key
          secret:
            secretName: gcp-key-secret
