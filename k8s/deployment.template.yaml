apiVersion: apps/v1
kind: Deployment
metadata:
  name: titanic-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: titanic-api
  template:
    metadata:
      labels:
        app: titanic-api
    spec:
      containers:
      - name: titanic-api
        image: gcr.io/GCP_TITANIC_PROJECT_ID/titanic-api:latest
        ports:
        - containerPort: 80
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /app/key.json
        - name: BUCKET_NAME
          valueFrom:
            secretKeyRef:
              name: gcp-secrets
              key: bucket-name
        - name: BLOB_NAME
          valueFrom:
            secretKeyRef:
              name: gcp-secrets
              key: blob-name
        volumeMounts:
        - name: gcp-key
          mountPath: /app/key.json
          subPath: key.json
      volumes:
      - name: gcp-key
        secret:
          secretName: gcp-key-secret
