apiVersion: apps/v1
kind: Deployment
metadata:
  name: serving-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: serving-api
  template:
    metadata:
      labels:
        app: serving-api
    spec:
      containers:
      - name: serving-api
        image: us-central1-docker.pkg.dev/sodium-pager-461309-p3/serving/serving-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /app/key.json
        - name: BUCKET_NAME
          valueFrom:
            secretKeyRef:
              name: gcp-secrets
              key: bucket-name
        - name: BLOB_NAME
          valueFrom:
            secretKeyRef:
              name: gcp-secrets
              key: blob-name
        volumeMounts:
        - name: gcp-key
          mountPath: /app/key.json
          subPath: key.json
      volumes:
      - name: gcp-key
        secret:
          secretName: gcp-key-secret
