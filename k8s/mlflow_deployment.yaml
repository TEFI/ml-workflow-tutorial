apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      nodeSelector:
        node-role: training
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.12.1
          ports:
            - containerPort: 5000
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /secrets/gcp/key.json
          volumeMounts:
            - name: gcp-key
              mountPath: /secrets/gcp
              readOnly: true
          command: ["mlflow", "server"]
          args:
            - "--backend-store-uri=postgresql://mlflow_user:mlflow_pass@<CLOUD_SQL_IP>:5432/mlflow_db"
            - "--default-artifact-root=gs://mlflow-artifacts-<your-suffix>"
            - "--host=0.0.0.0"
      volumes:
        - name: gcp-key
          secret:
            secretName: gcp-key
