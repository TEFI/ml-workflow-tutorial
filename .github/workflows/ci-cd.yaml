name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: docker build -t gcr.io/YOUR_PROJECT_ID/titanic-api:latest ./api

    - name: Push to Google Container Registry
      run: |
        echo ${{ secrets.GCP_KEY }} | base64 --decode > ${HOME}/gcp-key.json
        gcloud auth activate-service-account --key-file=${HOME}/gcp-key.json
        gcloud auth configure-docker
        docker push gcr.io/YOUR_PROJECT_ID/titanic-api:latest

    - name: Deploy to GKE
      run: |
        gcloud container clusters get-credentials YOUR_CLUSTER_NAME --zone YOUR_ZONE --project YOUR_PROJECT_ID
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml